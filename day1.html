<!DOCTYPE html>
<html>

<head>
    <title>Website</title>
    <link rel="stylesheet" href="day1.css">

</head>

<body>

    <p id="p1" class="pclass">Paragraph-1</p>
    <p id="p2">Paragraph-2</p>

    <h1 class="pclass">H1</h1>
    <h2>H2</h2>
    <h3>H3</h3>
    <h4>H4</h4>
    <h5>H5</h5>

    <div>
        <img src="doggy.jpg" alt="Dog Image">
    </div>

    <div>
        <video controls>
            <source src="beach.mp4" type="video/mp4">
        </video>
    </div>

    <ol>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>

    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>

        <tr>

        </tr>
        <tr>
            <td>3</td>
            <td>4</td>
        </tr>

    <a href="https://www.google.com">Google</a>

    <form>
        <label>Name:</label>
        <input id="input" type="text" onchange="example()">

        <p id="inputfield"></p>

        <input type="email">
        <br>

        <label>Gender:</label>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br>

        <label>Hobbies:</label>
        <input type="checkbox"> Cricket
        <input type="checkbox"> Dancing
        <br>

        <label>Events:</label>
        <select>
            <option>Festival</option>
            <option>Birthday</option>
            <option>Other</option>
        </select>
        <br><br>

        <button type="button" onclick="alert('Clicked')">
            Submit
        </button>

    <nav>
        <a href="#">Home</a>

    </nav>

    <div class="grid">
        <div id="one">1</div>
        <div id="two">2</div>
        <div id="three">3</div>
        <div id="four">4</div>
        <div id="five">5</div>
        <div id="six">6</div>
    </div>
