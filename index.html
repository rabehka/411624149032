<!DOCTYPE html>
<html lang="en">

<head>
    
    <title>hi everyone</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            padding: 20px;
        }

        nav {
            display: flex;
            flex-direction: column;
            background: #333;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 10px;
        }

        @media(min-width:768px) {
            nav {
                flex-direction: row;
                gap: 30px;
            }
        }

        h1 {
            margin: 20px 0;
            text-align: center;
        }

        img {
            display: block;
            width: 300px;
            max-width: 100%;
            margin: 20px auto;
            border-radius: 50px;
        }
        video {
            width: 50vw;
            display: block;
            padding: 10px;
            background:blue;
            margin: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th,
        td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #ddd;
        }

        button {
            background:blue;
            color: white;
            border: none;
            padding: 12px 25px;
            margin: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .item {
            background: lightgray;
            padding: 30px;
            text-align: center;
            font-size: 20px;
        }

        @media(max-width:767px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <h1>Hi everyone</h1>

    <img src="doggy.jpg" alt="Sample Image">

    <video controls>
        <source src="beach.mp4" type="video/mp4">
    </video>

    <table>
        <tr>
            <th>1</th>
            <th>hinana</th>
            <th>baby</th>
        </tr>
        <tr>
            <th>2</th>
            <td>jai</td>
            <td>ishu</td>
        </tr>
        <tr>
            <th>3</th>
            <td>mark</td>
            <td>simuu</td>
        </tr>
    </table>
    <button onclick="changeColor(this)">Click me </button>
    
    <script>
        function changeColor(button) {
            if (button.style.backgroundColor == "red") {
                button.style.backgroundColor = "blue";
            } else {
                button.style.backgroundColor = "red";
            }
        }
    </script>



    <div class="grid">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
        <div class="item">7</div>
        <div class="item">8</div>
    </div>

</body>

</html>
